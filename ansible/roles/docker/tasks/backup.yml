---

- name: "install nfs client"
  apt: name="{{item}}" state=present
  with_items:
    - nfs-common
  become: yes

- name: Create /backup directory
  ansible.builtin.file:
    path: /Backups
    state: directory
    mode: '0755'
  become: yes
  ignore_errors: true

- name: Mount an NFS volume
  ansible.posix.mount:
    src: windyarm.local:/volume1/Backups
    path: /Backups
    state: mounted
    fstype: nfs
  become: yes

- name: "install mediawiki backup script"
  copy: src=backup_mediawiki dest=/usr/local/bin/.
  become: yes

- name: Backup mediawiki
  ansible.builtin.cron:
    name: "mediawiki backup"
    special_time: daily
    job: "/usr/local/bin/backup_mediawiki"
